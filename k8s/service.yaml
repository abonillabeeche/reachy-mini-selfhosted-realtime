apiVersion: v1
kind: Service
metadata:
  name: reachy-s2s
  namespace: reachy-s2s
  labels:
    app: reachy-s2s
spec:
  type: NodePort
  selector:
    app: reachy-s2s
  ports:
    - name: ws
      port: 8765
      targetPort: ws
      # Reachy connects to ws://<NODE_IP>:31765/v1/realtime.
      # If your cluster restricts NodePort range or you prefer an Ingress with TLS,
      # swap this for a ClusterIP + Ingress in your own overlay.
      nodePort: 31765
      protocol: TCP
